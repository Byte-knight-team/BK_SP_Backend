spring.application.name=resturarent-system
spring.config.import=optional:file:.env[.properties],optional:file:.env.properties

# Cloud Database
spring.datasource.url=jdbc:mysql://syncserve-database-syncserve-93.j.aivencloud.com:28248/defaultdb?useSSL=true&sslMode=REQUIRED&serverTimezone=Asia/Colombo
spring.datasource.username=avnadmin
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver


# ───────────────────────── JPA / Hibernate ─────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ───────────────────────── JWT Configuration ─────────────────────────
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:8400000}
app.jwt.qr-session-expiration-ms=2400000
app.jwt.qr-token-expiration-ms=${JWT_QR_TOKEN_EXPIRATION_MS:2400000000}
app.qr.scan-base-url=${QR_SCAN_BASE_URL:http://localhost:5173/scan}

# Server
server.port=8080


# ───────────────────────── Swagger / OpenAPI ─────────────────────────
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Hikari pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=60000
spring.datasource.hikari.max-lifetime=90000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.validation-timeout=5000
spring.datasource.hikari.connection-test-query=SELECT 1

# Email service
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
# Testing switch:
# true  -> force email failure intentionally
# false -> use real SMTP behavior
app.email.force-fail=false

# ───────────────────────── SMS Gateway (Text.lk) ─────────────────────────
sms.textlk.url=https://app.text.lk/api/v3/sms/send
sms.textlk.token=${SMS_TEXTLK_TOKEN:}
sms.textlk.sender-id=TextLKDemo

# Frontend URLs
app.frontend.staff-login-url=${FRONTEND_STAFF_LOGIN_URL:http://localhost:5173/staff/login}
