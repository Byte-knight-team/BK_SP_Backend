spring.application.name=resturarent-system
spring.config.import=optional:file:.env[.properties],optional:file:.env.properties

# Cloud Database
spring.datasource.url=jdbc:mysql://syncserve-database-syncserve-93.j.aivencloud.com:28248/defaultdb?useSSL=true&sslMode=REQUIRED&serverTimezone=Asia/Colombo
spring.datasource.username=avnadmin
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver


# ───────────────────────── JPA / Hibernate ─────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ───────────────────────── JWT Configuration ─────────────────────────
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:8400000}
app.jwt.qr-session-expiration-ms=2400000

# 1 year default (ms). Override with env var JWT_QR_TOKEN_EXPIRATION_MS.
app.jwt.qr-token-expiration-ms=${JWT_QR_TOKEN_EXPIRATION_MS:31536000000}
app.qr.scan-base-url=${QR_SCAN_BASE_URL:http://localhost:5173/scan}
app.frontend.url=${FRONTEND_URL:http://localhost:5173}

# Server
server.port=8080


# ───────────────────────── Swagger / OpenAPI ─────────────────────────
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Hikari pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=60000
spring.datasource.hikari.max-lifetime=90000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.validation-timeout=5000
spring.datasource.hikari.connection-test-query=SELECT 1

# ───────────────────────── Gmail HTTPS API ─────────────────────────

app.email.gmail.client-id=${GMAIL_CLIENT_ID:}
app.email.gmail.client-secret=${GMAIL_CLIENT_SECRET:}
app.email.gmail.refresh-token=${GMAIL_REFRESH_TOKEN:}

app.email.gmail.sender-email=${GMAIL_SENDER_EMAIL:cravehouse.system.dev@gmail.com}
app.email.gmail.sender-name=${GMAIL_SENDER_NAME:Crave House}

app.email.gmail.token-url=https://oauth2.googleapis.com/token
app.email.gmail.send-url=https://gmail.googleapis.com/gmail/v1/users/me/messages/send

# true  = intentionally fail email sending for testing
# false = send through Gmail API
app.email.force-fail=false

# ───────────────────────── SMS Gateway (Text.lk) ─────────────────────────
sms.textlk.url=https://app.text.lk/api/v3/sms/send
sms.textlk.token=${SMS_TEXTLK_TOKEN:}
sms.textlk.sender-id=TextLKDemo

# Frontend URLs
app.frontend.staff-login-url=${FRONTEND_STAFF_LOGIN_URL:http://localhost:5173/staff/login}
app.frontend.customer-forgot-password-url=${FRONTEND_CUSTOMER_FORGOT_PASSWORD_URL:http://localhost:5173/reset-password}
FRONTEND_ALLOWED_ORIGINS=http://localhost:5173

# AWS S3 Cloud Infrastructure Configuration
aws.s3.bucket-name=${AWS_S3_BUCKET_NAME:bucket-name}
aws.s3.region=${AWS_REGION:ap-south-1}
aws.s3.access-key=${AWS_ACCESS_KEY_ID:dummy-key}
aws.s3.secret-key=${AWS_SECRET_ACCESS_KEY:dummy-key}

# ───────────────────────── Audit Retention ─────────────────────────
audit.retention.enabled=true

# Keep latest days of audit logs in database
audit.retention.active-days=60

# How many old logs to archive/delete in one run
audit.retention.batch-size=300

# Temporary local folder used before S3 upload
audit.retention.archive-folder=audit-archives

# Storage type: local or s3
audit.retention.storage=s3

# Folder path inside S3 bucket
audit.retention.s3-prefix=audit-archives

# Run every Sunday at 2:00 AM , but for testing use 0 * * * * *
audit.retention.cron=0 0 2 * * SUN
# audit.retention.cron=0 * * * * *

# ==========================================
# CACHING CONFIGURATION
# ==========================================
# Use 'simple' for local dev (RAM). Use 'redis' for cloud testing/production.
spring.cache.type=redis

# Redis Credentials mapped to Environment Variables
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}

# Connection Pooling
spring.data.redis.lettuce.pool.max-active=10
spring.data.redis.lettuce.pool.max-idle=5
spring.data.redis.lettuce.pool.min-idle=1

#stripe Secreats
stripe.secret.key=${STRIPE_SECRET_KEY:sk_test_your_actual_test_secret_key_here}
stripe.webhook.secret=${STRIPE_WEBHOOK_SECRET:}
